name: Attach Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-cgo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary_extension: ""
          - goos: windows
            goarch: amd64
            binary_extension: .exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Clone and build frontend
        run: |
          git clone https://github.com/Fearless743/komari-web web
          cd web
          npm install
          npm run build
          cd ..
          mkdir -p public/defaultTheme
          cp -f web/komari-theme.json public/defaultTheme/
          if [ -f web/preview.png ]; then cp -f web/preview.png public/defaultTheme/; fi
          if [ -f web/perview.png ]; then cp -f web/perview.png public/defaultTheme/; fi
          if [ -f public/defaultTheme/preview.png ] && [ ! -f public/defaultTheme/perview.png ]; then cp -f public/defaultTheme/preview.png public/defaultTheme/perview.png; fi
          if [ -f public/defaultTheme/perview.png ] && [ ! -f public/defaultTheme/preview.png ]; then cp -f public/defaultTheme/perview.png public/defaultTheme/preview.png; fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          GIN_MODE: release
        run: |
          BINARY_NAME=komari-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }}
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_HASH="${{ github.sha }}"
          go build -trimpath -ldflags="-s -w -X github.com/Fearless743/komari/utils.CurrentVersion=${VERSION} -X github.com/Fearless743/komari/utils.VersionHash=${VERSION_HASH}" -o $BINARY_NAME

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BINARY_NAME=komari-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }}
          gh release upload --clobber ${{ github.event.release.tag_name }} $BINARY_NAME --repo ${{ github.repository }}

  build-no-cgo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: arm64
            binary_extension: ""
          - goos: linux
            goarch: 386
            binary_extension: ""
          - goos: linux
            goarch: riscv64
            binary_extension: ""
          - goos: windows
            goarch: arm64
            binary_extension: .exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Clone and build frontend
        run: |
          git clone https://github.com/Fearless743/komari-web web
          cd web
          npm install
          npm run build
          cd ..
          mkdir -p public/defaultTheme
          cp -f web/komari-theme.json public/defaultTheme/
          if [ -f web/preview.png ]; then cp -f web/preview.png public/defaultTheme/; fi
          if [ -f web/perview.png ]; then cp -f web/perview.png public/defaultTheme/; fi
          if [ -f public/defaultTheme/preview.png ] && [ ! -f public/defaultTheme/perview.png ]; then cp -f public/defaultTheme/preview.png public/defaultTheme/perview.png; fi
          if [ -f public/defaultTheme/perview.png ] && [ ! -f public/defaultTheme/preview.png ]; then cp -f public/defaultTheme/perview.png public/defaultTheme/preview.png; fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GIN_MODE: release
        run: |
          BINARY_NAME=komari-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }}
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_HASH="${{ github.sha }}"
          go build -trimpath -ldflags="-s -w -X github.com/Fearless743/komari/utils.CurrentVersion=${VERSION} -X github.com/Fearless743/komari/utils.VersionHash=${VERSION_HASH}" -o $BINARY_NAME

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BINARY_NAME=komari-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }}
          gh release upload --clobber ${{ github.event.release.tag_name }} $BINARY_NAME --repo ${{ github.repository }}
